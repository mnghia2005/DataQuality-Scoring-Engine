<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Data Quality của {{myname}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center t-primaryext  mb-4"> BÁO CÁO CHẤT LƯỢNG DỮ LIỆU</h2>
    
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body text-center bg-white rounded">
            <h4 class="card-title text-success mb-0">
                🏆 Điểm Sức Khỏe Tổng Thể: <span class="fs-2 fw-bold">{{ score }}</span> / 100
            </h4>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h5 class="text-secondary mb-3"><i class="bi bi-table"></i> Đánh giá tổng thể</h5>
            <div class="table-responsive">
                {{ table_data | safe }}
                
                
            </div>



            
            
        </div>
        <div class="card-body">
            <h5 class="text-secondary mb-3"><i class="bi bi-table"></i> Chi tiết các lỗi vi phạm:</h5>
            <div class="table-responsive">
                {{table_dirty| safe }}
                
                
            </div>



            
            
        </div>
    </div>
</div>

</body>
</html>
